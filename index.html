<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pink Pig Rampage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-wrap">
  <div id="ui-bar">
    <span id="best-display">Kỷ lục: 0</span>
    <button id="sound-btn" aria-label="Bật/tắt âm thanh">
      <!-- Loa bật -->
      <svg id="icon-sound-on" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8.5v7a4.47 4.47 0 0 0 2.5-3.5zM14 3.23v2.06a7.007 7.007 0 0 1 0 13.42v2.06A9.007 9.007 0 0 0 14 3.23z"/>
      </svg>
      <!-- Loa tắt -->
      <svg id="icon-sound-off" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
        <path d="M16.5 12A4.5 4.5 0 0 0 14 8.5v2.09l2.41 2.41c.06-.31.09-.63.09-.99zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/>
      </svg>
    </button>
  </div>
  <canvas id="canvas"></canvas>
</div>

<!-- Hiện khi điện thoại nằm ngang: yêu cầu xoay dọc lại -->
<div id="rotate-notice">
  <div class="rotate-inner">
    <div class="rotate-icon">📱</div>
    <p>Vui lòng xoay dọc điện thoại để chơi nhé! 🐷</p>
  </div>
</div>

<!-- Nạp theo thứ tự: cấu hình -> trạng thái -> vẽ -> đối tượng -> điều khiển -> vòng lặp -->
<script src="core/config.js"></script>
<script src="core/state.js"></script>
<script src="core/render.js"></script>
<script src="core/entities.js"></script>
<script src="core/sound.js"></script>
<script src="core/input.js"></script>
<script src="core/main.js"></script>

</body>
</html>
